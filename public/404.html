<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .not-found-card {
      background: white;
      border-radius: 16px;
      padding: 60px 30px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .not-found-icon {
      font-size: 5rem;
      margin-bottom: 20px;
    }
    .not-found-title {
      font-size: 2rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 12px;
    }
    .not-found-text {
      color: #888;
      font-size: 1rem;
      margin-bottom: 30px;
    }
    .go-home-btn {
      padding: 14px 40px;
      background: linear-gradient(135deg, #4361ee, #3a0ca3);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .go-home-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-icon">🔍</div>
      <h1>AI Fake News Detector</h1>
    </div>
  </header>

  <main>
    <div class="not-found-card">
      <div class="not-found-icon">🔍</div>
      <div class="not-found-title">404 — Page Not Found</div>
      <p class="not-found-text">
        The page you are looking for does not exist.
      </p>
      <a href="/" class="go-home-btn">
        🏠 Go Back to Home
      </a>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>🔍 AI Fake News Detector</p>
      <p>Built with Node.js · Express · MongoDB · OpenRouter AI</p>
    </div>
  </footer>

</body>
</html>
